services:
  - type: web
    name: cloud-sre-agent
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ENVIRONMENT
        value: "prod"
      - key: REQUIRE_APPROVAL_FOR_WRITES
        value: "true"
      - key: AWS_REGION
        value: "us-east-1"
      # Demo mode by default. Set DEMO_MODE=false + AWS creds below for live telemetry.
      - key: DEMO_MODE
        value: "true"
      - key: USE_LOCAL_STORE
        value: "true"
      # --- Live AWS (set in Render Dashboard → Environment) ---
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: BEDROCK_MODEL_ID
        value: "anthropic.claude-3-5-sonnet-20241022-v2:0"
      - key: DYNAMODB_INCIDENTS_TABLE
        value: "cloud-sre-incidents"
      - key: DYNAMODB_APPROVALS_TABLE
        value: "cloud-sre-approvals"
      # RENDER_EXTERNAL_URL is injected automatically by Render
