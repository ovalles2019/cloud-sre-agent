services:
  - type: web
    name: cloud-sre-agent
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DEMO_MODE
        value: "true"
      - key: ENVIRONMENT
        value: "prod"
      - key: USE_LOCAL_STORE
        value: "true"
      - key: REQUIRE_APPROVAL_FOR_WRITES
        value: "true"
      # Optional: set in Render dashboard for live AWS telemetry + Bedrock reasoning
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "us-east-1"
